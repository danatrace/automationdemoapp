apiVersion: v1
kind: Namespace
metadata:
  name: banking-demo
---
apiVersion: v1
kind: Secret
metadata:
  name: banking-observability-demo-secrets
  namespace: banking-demo
type: Opaque
stringData:
  SESSION_SECRET: replace-with-a-long-random-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-observability-demo
  namespace: banking-demo
  labels:
    app: banking-observability-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-observability-demo
  template:
    metadata:
      labels:
        app: banking-observability-demo
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: banking-observability-demo
          # Replace this with your own image before applying.
          # See the README Kubernetes deploy section for build and push instructions.
          image: YOUR_REGISTRY/automationdemoapp:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: banking-observability-demo-secrets
                  key: SESSION_SECRET
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: banking-observability-demo
  namespace: banking-demo
spec:
  selector:
    app: banking-observability-demo
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP