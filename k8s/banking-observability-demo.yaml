apiVersion: v1
kind: Namespace
metadata:
  name: banking-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-observability-demo
  namespace: banking-demo
  labels:
    app: banking-observability-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-observability-demo
  template:
    metadata:
      labels:
        app: banking-observability-demo
    spec:
      containers:
        - name: banking-observability-demo
          image: ghcr.io/danatrace/automationdemoapp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: SESSION_SECRET
              value: banking-demo-session-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: banking-observability-demo
  namespace: banking-demo
spec:
  selector:
    app: banking-observability-demo
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP